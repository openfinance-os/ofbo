# Demo-profile deployment (BD-14): BFF on Cloudflare Workers.
# Secrets (never here): DATABASE_URL via `wrangler secret put` / CI.
name = "ofbo-bff"
main = "src/worker.ts"
compatibility_date = "2025-05-05"
compatibility_flags = ["nodejs_compat"]

[vars]
DEPLOY_PROFILE = "demo"
# Demo bank tenant — matches the seeded dataset and the node entry's default.
BANK_ID = "11111111-1111-4111-8111-111111111111"
# P6 egress target: ALL Nebras-bound traffic (consent revoke, etc.) routes here.
NEBRAS_SIM_URL = "https://nebras-sim-production.up.railway.app"

[observability]
enabled = true

# ── Hyperdrive (fixes the ~12s/screen hosted latency) ────────────────────────────────
# The Worker runs at the edge but Supabase is in ap-northeast-2; a fresh Postgres connect +
# TLS handshake per request dominated each response. Hyperdrive pools warm connections near
# the origin so the Worker reuses them. worker.ts prefers env.HYPERDRIVE.connectionString over
# DATABASE_URL (clean fallback when the binding is absent).
# Config 'ofbo-db' wraps the Supabase Postgres; recreate with:
#   pnpm exec wrangler hyperdrive create ofbo-db --connection-string="<supabase-url>"
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "06ae60ce3e704d0984e0e9062ec5a964"
