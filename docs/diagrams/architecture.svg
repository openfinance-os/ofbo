<svg viewBox="0 0 900 770" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="ui-sans-serif, system-ui, sans-serif">
<title id="t">OFBO monorepo architecture</title>
<desc id="d">A layered view of the Open Finance Back Office pnpm monorepo: the Next.js portal calls the BFF Worker which exposes 17 domain modules over a port interface (P1 to P9) backed by simulator or enterprise adapters; shared packages and external services (Nebras simulator, Supabase, Cloudflare) sit underneath.</desc>
<style>
  .ink   { fill: #2c2c2a; }
  .ink2  { fill: #5f5e5a; }
  .band  { fill: #faf9f5; stroke: #d3d1c7; }
  .acct  { fill: rgba(127,119,221,0.08); stroke: #7F77DD; }
  .chip  { fill: #ffffff; stroke: #e6e4dc; }
  .achip { fill: #ffffff; stroke: #7F77DD; }
  .lbl   { font-weight: 700; }
  .mono  { font-family: ui-monospace, monospace; }
  .edge  { stroke: #b4b2a9; }
</style>

<text x="28" y="30" class="ink lbl" font-size="17">OFBO — pnpm monorepo</text>
<text x="28" y="48" class="ink2" font-size="11">Bank-neutral Open Finance Back Office · LFI + TPP-of-record</text>

