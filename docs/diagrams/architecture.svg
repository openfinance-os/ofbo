</g>

<text x="28" y="680" class="ink2" font-size="9.5">Spec canon: docs/PRD_Open_Finance_Back_Office.md + specs/backoffice-openapi.yaml (57 paths)  ·  All Nebras-bound traffic routes through P6 egress only</text>
