<svg viewBox="0 0 980 672" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="ui-sans-serif, system-ui, sans-serif">
<title id="t">How OFBO is built end-to-end — the AI-DLC harness</title>
<desc id="d">End-to-end build harness. Authoring loop: from canon (CLAUDE.md, PRD, OpenAPI, backlog) pick one story into an isolated worktree, write the spec first so a contract test fails, implement to green, then run local reviewer agents. Delivery: a PR runs CI quality gates Q1 build and unit, Q2 static analysis and SAST, Q3 integration contract and E2E, Q4 security and dependency scan, Q4.5 BCBS 239 lineage; a failed gate blocks merge. A human four-eyes merge to main triggers auto-deploy of BFF and portal to Cloudflare and the Nebras simulator to Railway, then a smoke suite against the live demo URL. On a published release, gates re-run and a sealed evidence bundle is committed. Authoring guardrails (worktree policy, PII guard, spec tripwire) are enforced on every edit.</desc>
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#5f5e5a"/></marker>
  <marker id="aA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#7F77DD"/></marker>
</defs>
<style>
  .ink{fill:#2c2c2a;} .ink2{fill:#5f5e5a;}
  .box{fill:#faf9f5;stroke:#d3d1c7;}
  .acc{fill:rgba(127,119,221,0.09);stroke:#7F77DD;}
  .card{fill:#ffffff;stroke:#e6e4dc;}
  .e{stroke:#5f5e5a;fill:none;stroke-width:1.4;}
  .eD{stroke:#7F77DD;fill:none;stroke-width:1.4;stroke-dasharray:5 4;}
  .lbl{font-weight:700;} .mono{font-family:ui-monospace,monospace;}
  .h{font-size:8.5px;} .ttl{font-size:9.5px;font-weight:700;}
</style>

<text x="24" y="28" class="ink lbl" font-size="16">How OFBO is built, end-to-end</text>
<text x="24" y="45" class="ink2" font-size="11">AI-DLC story loop → quality-gated CI → four-eyes merge → auto-deploy → release evidence</text>

<text x="24" y="76" class="ink2 lbl" font-size="10">①  AUTHOR — one story per branch, inside an isolated git worktree</text>
<g>
  <g><rect x="24" y="86" width="168" height="96" rx="7" class="acc"/><text x="34" y="104" class="ink ttl mono">Canon · ground truth</text>
    <text x="34" y="120" class="ink2 h mono">CLAUDE.md</text><text x="34" y="133" class="ink2 h mono">PRD §7 — 80 reqs</text><text x="34" y="146" class="ink2 h mono">OpenAPI · 57 paths</text><text x="34" y="159" class="ink2 h mono">backlog.yaml</text></g>
  <g><rect x="212" y="86" width="168" height="96" rx="7" class="box"/><text x="222" y="104" class="ink ttl mono">① Story → worktree</text>
    <text x="222" y="120" class="ink2 h mono">feature/BACKOFFICE-NN</text><text x="222" y="133" class="ink2 h mono">EnterWorktree</text><text x="222" y="146" class="ink2 h mono">bgIsolation hard-block</text><text x="222" y="159" class="ink2 h mono">PRD milestone order</text></g>
  <g><rect x="400" y="86" width="168" height="96" rx="7" class="box"/><text x="410" y="104" class="ink ttl mono">② Spec-first</text>
    <text x="410" y="120" class="ink2 h mono">add OpenAPI path</text><text x="410" y="133" class="ink2 h mono">pnpm gen → types</text><text x="410" y="146" class="h mono" fill="#7F77DD">contract test FAILS</text><text x="410" y="159" class="ink2 h mono">(spec changes first)</text></g>
  <g><rect x="588" y="86" width="168" height="96" rx="7" class="box"/><text x="598" y="104" class="ink ttl mono">③ Implement → green</text>
    <text x="598" y="120" class="ink2 h mono">routes→service→store</text><text x="598" y="133" class="ink2 h mono">scope ×2 · idempotency</text><text x="598" y="146" class="ink2 h mono">audit + lineage (DoD)</text><text x="598" y="159" class="ink2 h mono">coverage ≥ 80%</text></g>
  <g><rect x="776" y="86" width="180" height="96" rx="7" class="box"/><text x="786" y="104" class="ink ttl mono">④ Local reviewers</text>
    <text x="786" y="120" class="ink2 h mono">contract-conformance</text><text x="786" y="133" class="ink2 h mono">hard-stop agent</text><text x="786" y="146" class="ink2 h mono">(.claude/agents)</text><text x="786" y="159" class="ink2 h mono">before the PR</text></g>
</g>
<g class="e">
  <line x1="192" y1="134" x2="210" y2="134" marker-end="url(#a)"/>
  <line x1="380" y1="134" x2="398" y2="134" marker-end="url(#a)"/>
  <line x1="568" y1="134" x2="586" y2="134" marker-end="url(#a)"/>
  <line x1="756" y1="134" x2="774" y2="134" marker-end="url(#a)"/>
</g>
<path class="e" marker-end="url(#a)" d="M866 182 C866 205 600 204 492 220"/>
<text x="700" y="206" class="ink2" font-size="9">open PR ↓</text>

<text x="24" y="208" class="ink2 lbl" font-size="10">②  DELIVER — CI/CD on the PR, then auto-deploy to the live demo</text>
<rect x="24" y="216" width="932" height="156" rx="8" class="box"/>
<text x="36" y="236" class="ink lbl mono" font-size="11">⑤ CI quality gates · .github/workflows/ci.yml</text>
<text x="430" y="236" class="ink2" font-size="9">a failed gate blocks merge</text>
<g>
  <g><rect x="34" y="248" width="176" height="100" rx="6" class="card"/><text x="44" y="266" class="ink ttl mono">Q1 build + unit</text><text x="44" y="284" class="ink2 h mono">pnpm build · test</text><text x="44" y="298" class="ink2 h mono">gen diff committed</text></g>
  <g><rect x="218" y="248" width="176" height="100" rx="6" class="card"/><text x="228" y="266" class="ink ttl mono">Q2 static + SAST</text><text x="228" y="284" class="ink2 h mono">eslint · tsc</text><text x="228" y="298" class="ink2 h mono">semgrep typescript</text></g>
  <g><rect x="402" y="248" width="176" height="100" rx="6" class="card"/><text x="412" y="266" class="ink ttl mono">Q3 integ + contract</text><text x="412" y="284" class="ink2 h mono">Postgres + contract</text><text x="412" y="298" class="ink2 h mono">Playwright E2E</text></g>
  <g><rect x="586" y="248" width="176" height="100" rx="6" class="card"/><text x="596" y="266" class="ink ttl mono">Q4 security + deps</text><text x="596" y="284" class="ink2 h mono">audit --prod</text><text x="596" y="298" class="ink2 h mono">semgrep secrets</text></g>
  <g><rect x="770" y="248" width="176" height="100" rx="6" class="acc"/><text x="780" y="266" class="ink ttl mono">Q4.5 BCBS 239</text><text x="780" y="284" class="ink2 h mono">lineage:gate (P7)</text><text x="780" y="298" class="ink2 h mono">every table emits</text></g>
</g>
<text x="36" y="364" class="ink2" font-size="8.5">cancels superseded runs per ref · Q5 (manual prod approval) is evidenced at release time, not on every PR</text>

<path class="e" marker-end="url(#a)" d="M300 372 C300 388 220 388 176 398"/>
<text x="306" y="388" class="ink2" font-size="9">all gates green ↓</text>

<g>
  <g><rect x="24" y="398" width="296" height="118" rx="7" class="acc"/><text x="34" y="418" class="ink ttl mono">⑥ Four-eyes merge → main</text>
    <text x="34" y="436" class="ink2 h mono">HG-0001 governance control</text><text x="34" y="450" class="ink2 h mono">protected main branch</text><text x="34" y="464" class="ink2 h mono">a human approves + merges</text><text x="34" y="478" class="ink2 h mono">(no self-merge of own work)</text></g>
  <g><rect x="334" y="398" width="296" height="118" rx="7" class="box"/><text x="344" y="418" class="ink ttl mono">⑦ Auto-deploy demo · deploy.yml</text>
    <text x="344" y="436" class="ink2 h mono">seed-demo (synthetic, idempotent)</text><text x="344" y="450" class="ink2 h mono">BFF + Portal → Cloudflare Workers</text><text x="344" y="464" class="ink2 h mono">Nebras sim → Railway</text><text x="344" y="478" class="h mono" fill="#7F77DD">smoke suite vs LIVE url — fails if broken</text></g>
  <g><rect x="644" y="398" width="312" height="118" rx="7" class="box"/><text x="654" y="418" class="ink ttl mono">⑧ Release evidence · release-evidence.yml</text>
    <text x="654" y="436" class="ink2 h mono">trigger: on release published</text><text x="654" y="450" class="ink2 h mono">re-run gates @ the released commit</text><text x="654" y="464" class="ink2 h mono">live BCBS 239 lineage proof</text><text x="654" y="478" class="ink2 h mono">sealed bundle → releases/&lt;tag&gt;/</text></g>
</g>
<line class="e" x1="320" y1="457" x2="332" y2="457" marker-end="url(#a)"/>
<path class="eD" marker-end="url(#aA)" d="M630 490 C636 490 640 490 642 482"/>
<text x="556" y="506" class="ink2" font-size="8.5">later · on release</text>

<text x="24" y="544" class="ink2 lbl" font-size="10">GUARDRAILS — enforced every session &amp; every Edit/Write (.claude/hooks + settings.json), wrapping ①–③</text>
<g>
  <g><rect x="24" y="552" width="300" height="50" rx="6" class="acc"/><text x="34" y="570" class="ink ttl mono">SessionStart · worktree-policy</text><text x="34" y="587" class="ink2 h mono">surfaces the isolation rule</text></g>
  <g><rect x="332" y="552" width="300" height="50" rx="6" class="acc"/><text x="342" y="570" class="ink ttl mono">PreToolUse · pii-guard</text><text x="342" y="587" class="ink2 h mono">blocks 784… EID / real IBAN literals</text></g>
  <g><rect x="640" y="552" width="316" height="50" rx="6" class="acc"/><text x="650" y="570" class="ink ttl mono">PreToolUse · spec-tripwire</text><text x="650" y="587" class="ink2 h mono">locks OpenAPI mid-feature (spec-only PR)</text></g>
</g>

<text x="24" y="628" class="ink2" font-size="9">Build order M0→M6 · every merged story is demoable at the live URL · ofbo-bff.michartmann.workers.dev · nebras-sim-production.up.railway.app</text>
</svg>
