<svg id="svg-brain" viewBox="0 0 1000 650" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-brain d-brain" font-family="ui-sans-serif, system-ui, sans-serif">
<title id="t-brain">The regulated-entity brain — the full spectrum of institutional context</title>
<desc id="d-brain">The model arrives generic and is trained on a regulated entity by building a context brain, seeded from what the institution already has. The brain has a general-practice layer that ships with the model and an entity-specific layer covering the wider spectrum of how the institution works, grouped into: how we work (ways of working, governance and approvals, architectural patterns, decisions/ADRs), what we build with (approved technologies, code repos and references, design system and tokens, platform and infra blueprints), how we communicate (terminology, abbreviations, comms style and channels, brand and tone of voice), and what is regulated and at stake (regulatory specifics, systems and ports mapping, personas and scopes, risk taxonomy and controls). The discovery and delivery harnesses read from the brain and write new context back every cycle, so it compounds — the moat.</desc>
<defs>
  <marker id="brain-ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#5f5e5a"/></marker>
  <marker id="brain-arA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#7F77DD"/></marker>
</defs>
<style>
  #svg-brain .ink{fill:#2c2c2a;} #svg-brain .ink2{fill:#5f5e5a;}
  #svg-brain .box{fill:#faf9f5;stroke:#d3d1c7;}
  #svg-brain .brain{fill:rgba(127,119,221,0.05);stroke:#7F77DD;stroke-width:1.5;}
  #svg-brain .gen{fill:#ffffff;stroke:#7F77DD;}
  #svg-brain .ent{fill:rgba(127,119,221,0.10);stroke:#7F77DD;}
  #svg-brain .chip{fill:#ffffff;stroke:#b9b3e8;}
  #svg-brain .strip{fill:rgba(127,119,221,0.09);stroke:#7F77DD;}
  #svg-brain .e{stroke:#5f5e5a;fill:none;stroke-width:1.4;}
  #svg-brain .ch{fill:#7F77DD;font-weight:700;}
  #svg-brain .lbl{font-weight:700;} #svg-brain .mono{font-family:ui-monospace,monospace;}
  #svg-brain .h{font-size:8.5px;} #svg-brain .ttl{font-size:9.5px;font-weight:700;}
</style>
<text x="24" y="26" class="ink lbl" font-size="16">The regulated-entity brain — context is king</text>
<text x="24" y="44" class="ink2" font-size="11">The model arrives generic. Context — the wider spectrum of how the institution works — is what makes it the entity's own, and it compounds.</text>
<text x="24" y="68" class="ink2 lbl mono" font-size="10">① SEED &amp; TRAIN · bootstrapped from what the institution already has</text>
<g class="mono" font-size="8.5" text-anchor="middle">
  <g><rect x="24" y="72" width="152" height="30" rx="6" class="chip"/><text x="100" y="91" class="ink">policies &amp; standards</text></g>
  <g><rect x="184" y="72" width="152" height="30" rx="6" class="chip"/><text x="260" y="91" class="ink">governance &amp; org</text></g>
  <g><rect x="344" y="72" width="152" height="30" rx="6" class="chip"/><text x="420" y="91" class="ink">glossaries &amp; style</text></g>
  <g><rect x="504" y="72" width="152" height="30" rx="6" class="chip"/><text x="580" y="91" class="ink">regulator mandates</text></g>
  <g><rect x="664" y="72" width="152" height="30" rx="6" class="chip"/><text x="740" y="91" class="ink">system inventory</text></g>
  <g><rect x="824" y="72" width="152" height="30" rx="6" class="chip"/><text x="900" y="91" class="ink">past projects</text></g>
</g>
<g class="e">
  <path marker-end="url(#brain-ar)" d="M300 104 L300 120"/>
  <path marker-end="url(#brain-ar)" d="M500 104 L500 120"/>
  <path marker-end="url(#brain-ar)" d="M700 104 L700 120"/>
</g>
<rect x="24" y="122" width="952" height="406" rx="12" class="brain"/>
<text x="40" y="144" class="ink lbl" font-size="12.5">THE REGULATED-ENTITY BRAIN</text>
<text x="300" y="144" class="ink2" font-size="9.5">the institution's second brain · single, governed source of truth</text>
<rect x="40" y="152" width="920" height="46" rx="8" class="gen"/>
<text x="52" y="169" class="ink ttl">GENERAL PRACTICE · ships with the model — the same for every entity</text>
<text x="52" y="186" class="ink2 h">conventions · security posture · double-diamond method · regulatory patterns: four-eyes · INSERT-only audit · lineage</text>
<rect x="40" y="206" width="920" height="276" rx="8" class="ent"/>
<text x="52" y="223" class="ink ttl">WHAT MAKES THIS ENTITY ITSELF · built up over time — the wider spectrum</text>
<g text-anchor="middle">
  <text x="161" y="242" class="ch" font-size="8.5">HOW WE WORK</text>
  <text x="387" y="242" class="ch" font-size="8.5">WHAT WE BUILD WITH</text>
  <text x="613" y="242" class="ch" font-size="8.5">HOW WE COMMUNICATE</text>
  <text x="839" y="242" class="ch" font-size="8.5">REGULATED &amp; AT STAKE</text>
</g>
<g class="mono" font-size="8" text-anchor="middle">
  <g><rect x="56" y="250" width="210" height="30" rx="6" class="chip"/><text x="161" y="269" class="ink">ways of working</text></g>
  <g><rect x="56" y="288" width="210" height="30" rx="6" class="chip"/><text x="161" y="307" class="ink">governance &amp; approvals</text></g>
  <g><rect x="56" y="326" width="210" height="30" rx="6" class="chip"/><text x="161" y="345" class="ink">architectural patterns</text></g>
  <g><rect x="56" y="364" width="210" height="30" rx="6" class="chip"/><text x="161" y="383" class="ink">decisions (ADRs)</text></g>
  <g><rect x="282" y="250" width="210" height="30" rx="6" class="chip"/><text x="387" y="269" class="ink">approved technologies</text></g>
  <g><rect x="282" y="288" width="210" height="30" rx="6" class="chip"/><text x="387" y="307" class="ink">code repos &amp; references</text></g>
  <g><rect x="282" y="326" width="210" height="30" rx="6" class="chip"/><text x="387" y="345" class="ink">design system &amp; tokens</text></g>
  <g><rect x="282" y="364" width="210" height="30" rx="6" class="chip"/><text x="387" y="383" class="ink">platform &amp; infra blueprints</text></g>
  <g><rect x="508" y="250" width="210" height="30" rx="6" class="chip"/><text x="613" y="269" class="ink">terminology &amp; wording</text></g>
  <g><rect x="508" y="288" width="210" height="30" rx="6" class="chip"/><text x="613" y="307" class="ink">abbreviations &amp; acronyms</text></g>
  <g><rect x="508" y="326" width="210" height="30" rx="6" class="chip"/><text x="613" y="345" class="ink">comms style &amp; channels</text></g>
  <g><rect x="508" y="364" width="210" height="30" rx="6" class="chip"/><text x="613" y="383" class="ink">brand &amp; tone of voice</text></g>
  <g><rect x="734" y="250" width="210" height="30" rx="6" class="chip"/><text x="839" y="269" class="ink">regulatory specifics</text></g>
  <g><rect x="734" y="288" width="210" height="30" rx="6" class="chip"/><text x="839" y="307" class="ink">systems &amp; ports mapping</text></g>
  <g><rect x="734" y="326" width="210" height="30" rx="6" class="chip"/><text x="839" y="345" class="ink">personas &amp; scopes</text></g>
  <g><rect x="734" y="364" width="210" height="30" rx="6" class="chip"/><text x="839" y="383" class="ink">risk taxonomy &amp; controls</text></g>
</g>
<text x="52" y="470" class="ink2 mono" font-size="8">versioned &amp; governed — CLAUDE.md · memory/ · ADRs · ports config · single source of truth, not tribal knowledge</text>
<path class="e" marker-end="url(#brain-arA)" d="M900 544 L900 530" stroke="#7F77DD"/>
<path class="e" marker-end="url(#brain-ar)" d="M930 530 L930 544"/>
<rect x="24" y="544" width="952" height="46" rx="9" class="box"/>
<text x="40" y="564" class="ink lbl mono" font-size="10">THE MODEL · discovery + delivery harnesses</text>
<text x="320" y="564" class="ink2" font-size="9">↑ reads context at every step   ↓ writes new context back after every cycle</text>
<text x="40" y="580" class="ink2" font-size="9">so the brain keeps learning — the institution's know-how lives in the system, not in people's heads</text>
<rect x="24" y="600" width="952" height="42" rx="9" class="strip"/>
<text x="40" y="620" class="ink lbl mono" font-size="10">② GROWS EVERY CYCLE</text>
<text x="232" y="620" class="ink2" font-size="9">each cycle deposits new context — onboarding the next solution gets faster, safer, more the entity's own</text>
<text x="40" y="635" class="ink2 mono" font-size="9">generic model + entity brain = a regulated entity's own, defensible way of building — this is the moat</text>
</svg>
