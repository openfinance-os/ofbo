<svg id="svg-brain" viewBox="0 0 980 590" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-brain d-brain" font-family="ui-sans-serif, system-ui, sans-serif">
<title id="t-brain">The regulated-entity brain — context that adapts the model to the institution</title>
<desc id="d-brain">The model arrives generic and is trained on a regulated entity by building up a context brain. It is seeded from what the entity already has (policies, governance, glossaries, regulator mandates, system inventory, past decisions). The brain has two layers: general practice that ships with the model, and entity-specific context — ways of working, terminology, abbreviations, regulatory specifics, systems and ports mapping, personas and scopes, risk taxonomy, and decisions. The model's discovery and delivery harnesses read from the brain at every step and write new context back after every cycle, so it compounds over time.</desc>
<defs>
  <marker id="brain-ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#5f5e5a"/></marker>
  <marker id="brain-arA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#7F77DD"/></marker>
</defs>
<style>
  #svg-brain .ink{fill:#2c2c2a;} #svg-brain .ink2{fill:#5f5e5a;}
  #svg-brain .box{fill:#faf9f5;stroke:#d3d1c7;}
  #svg-brain .brain{fill:rgba(127,119,221,0.05);stroke:#7F77DD;stroke-width:1.5;}
  #svg-brain .gen{fill:#ffffff;stroke:#7F77DD;}
  #svg-brain .ent{fill:rgba(127,119,221,0.12);stroke:#7F77DD;}
  #svg-brain .chip{fill:#ffffff;stroke:#b9b3e8;}
  #svg-brain .pill{fill:#ffffff;stroke:#7F77DD;}
  #svg-brain .strip{fill:rgba(127,119,221,0.09);stroke:#7F77DD;}
  #svg-brain .e{stroke:#5f5e5a;fill:none;stroke-width:1.4;}
  #svg-brain .lbl{font-weight:700;} #svg-brain .mono{font-family:ui-monospace,monospace;}
  #svg-brain .h{font-size:8.5px;} #svg-brain .ttl{font-size:9.5px;font-weight:700;}
</style>
<text x="24" y="26" class="ink lbl" font-size="16">The regulated-entity brain — context is king</text>
<text x="24" y="44" class="ink2" font-size="11">The model arrives generic. Context is what makes it a given institution's own way of building — and it compounds.</text>
<rect x="24" y="66" width="196" height="316" rx="9" class="box"/>
<text x="36" y="88" class="ink lbl mono" font-size="10.5">① SEED &amp; TRAIN</text>
<text x="36" y="102" class="ink2" font-size="8.5">from what the entity already has</text>
<g class="mono" font-size="8.5" text-anchor="middle">
  <g><rect x="36" y="112" width="172" height="34" rx="6" class="chip"/><text x="122" y="133" class="ink">policies &amp; standards</text></g>
  <g><rect x="36" y="152" width="172" height="34" rx="6" class="chip"/><text x="122" y="173" class="ink">governance &amp; org structure</text></g>
  <g><rect x="36" y="192" width="172" height="34" rx="6" class="chip"/><text x="122" y="213" class="ink">glossary &amp; house style</text></g>
  <g><rect x="36" y="232" width="172" height="34" rx="6" class="chip"/><text x="122" y="253" class="ink">regulator mandates</text></g>
  <g><rect x="36" y="272" width="172" height="34" rx="6" class="chip"/><text x="122" y="293" class="ink">system &amp; vendor inventory</text></g>
  <g><rect x="36" y="312" width="172" height="34" rx="6" class="chip"/><text x="122" y="333" class="ink">past projects &amp; decisions</text></g>
</g>
<path class="e" marker-end="url(#brain-ar)" d="M220 224 L244 224"/>
<text x="232" y="216" text-anchor="middle" class="ink2" font-size="7.5">seed</text>
<rect x="246" y="66" width="470" height="416" rx="12" class="brain"/>
<text x="262" y="88" class="ink lbl" font-size="12">THE REGULATED-ENTITY BRAIN</text>
<text x="262" y="102" class="ink2" font-size="9">the institution's second brain · single source of truth</text>
<rect x="262" y="110" width="438" height="70" rx="8" class="gen"/>
<text x="274" y="128" class="ink ttl">GENERAL PRACTICE · ships with the model</text>
<text x="274" y="145" class="ink2 h">conventions · security posture · double-diamond method</text>
<text x="274" y="159" class="ink2 h">regulatory patterns: four-eyes · INSERT-only audit · lineage</text>
<text x="274" y="173" class="ink2 h">— the same for every regulated entity</text>
<rect x="262" y="188" width="438" height="216" rx="8" class="ent"/>
<text x="274" y="206" class="ink ttl">WHAT MAKES THIS ENTITY ITSELF · built up over time</text>
<g class="mono" font-size="8.5" text-anchor="middle">
  <g><rect x="274" y="214" width="202" height="34" rx="6" class="chip"/><text x="375" y="235" class="ink">ways of working</text></g>
  <g><rect x="486" y="214" width="204" height="34" rx="6" class="chip"/><text x="588" y="235" class="ink">terminology &amp; wording</text></g>
  <g><rect x="274" y="254" width="202" height="34" rx="6" class="chip"/><text x="375" y="275" class="ink">abbreviations &amp; acronyms</text></g>
  <g><rect x="486" y="254" width="204" height="34" rx="6" class="chip"/><text x="588" y="275" class="ink">regulatory specifics</text></g>
  <g><rect x="274" y="294" width="202" height="34" rx="6" class="chip"/><text x="375" y="315" class="ink">systems &amp; ports mapping</text></g>
  <g><rect x="486" y="294" width="204" height="34" rx="6" class="chip"/><text x="588" y="315" class="ink">personas &amp; scopes</text></g>
  <g><rect x="274" y="334" width="202" height="34" rx="6" class="chip"/><text x="375" y="355" class="ink">risk taxonomy &amp; controls</text></g>
  <g><rect x="486" y="334" width="204" height="34" rx="6" class="chip"/><text x="588" y="355" class="ink">decisions (ADRs)</text></g>
</g>
<text x="274" y="392" class="ink2 mono" font-size="8">versioned &amp; governed in the repo — CLAUDE.md · memory/ · ADRs · ports config</text>
<rect x="762" y="66" width="194" height="316" rx="9" class="box"/>
<text x="774" y="88" class="ink lbl mono" font-size="10.5">THE MODEL</text>
<text x="774" y="102" class="ink2" font-size="8.5">generic until trained</text>
<g class="mono" text-anchor="middle">
  <g><rect x="774" y="116" width="170" height="74" rx="8" class="pill"/><text x="859" y="148" class="ink ttl">Discovery harness</text><text x="859" y="166" class="ink2 h">frame the right problem</text></g>
  <g><rect x="774" y="206" width="170" height="74" rx="8" class="pill"/><text x="859" y="238" class="ink ttl">Delivery harness</text><text x="859" y="256" class="ink2 h">ship under auto control</text></g>
</g>
<text x="859" y="304" text-anchor="middle" class="ink2" font-size="8.5">one double-diamond model</text>
<text x="859" y="317" text-anchor="middle" class="ink2" font-size="8.5">(Part A)</text>
<path class="e" marker-end="url(#brain-arA)" d="M716 150 L760 150" stroke="#7F77DD"/>
<text x="738" y="143" text-anchor="middle" class="ink2" font-size="7.5">reads</text>
<path class="e" marker-end="url(#brain-ar)" d="M760 250 L718 250"/>
<text x="739" y="266" text-anchor="middle" class="ink2" font-size="7.5">writes</text>
<rect x="24" y="500" width="932" height="62" rx="9" class="strip"/>
<text x="40" y="521" class="ink lbl mono" font-size="10.5">② GROWS EVERY CYCLE</text>
<text x="40" y="538" class="ink2" font-size="9.5">Each discovery &amp; delivery deposits new context. The brain compounds — onboarding the next solution gets faster, safer, and more the entity's own.</text>
<text x="40" y="553" class="ink2 mono" font-size="9.5">generic model + entity brain = a regulated entity's own, defensible way of building.</text>
</svg>
