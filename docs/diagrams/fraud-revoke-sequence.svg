<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="ui-sans-serif, system-ui, sans-serif">
<title id="t">Fraud-suspected consent revocation sequence (BACKOFFICE-22)</title>
<desc id="d">A Risk analyst posts a fraud revocation; the BFF requests a four-eyes approval and returns 202 with an approval_request instead of acting inline. A second Risk approver approves, the BFF executes the revocation through the P6 egress gateway to Nebras with reason FRAUD_SUSPECTED, receives a sub-five-second acknowledgement, writes a consent_revoked event to the high-class audit trail with an STR draft reference, and returns 200. PSU notification is deferred per fraud policy and STR submission is out of scope (BACKOFFICE-63).</desc>
<defs>
  <marker id="s" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#5f5e5a"/></marker>
  <marker id="sa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#7F77DD"/></marker>
</defs>
<style>
  .ink{fill:#2c2c2a;} .ink2{fill:#5f5e5a;}
  .head{fill:#faf9f5;stroke:#d3d1c7;}
  .ahead{fill:rgba(127,119,221,0.10);stroke:#7F77DD;}
  .life{stroke:#d3d1c7;stroke-width:1.2;stroke-dasharray:3 4;}
  .call{stroke:#5f5e5a;stroke-width:1.4;}
  .ret{stroke:#8a8881;stroke-width:1.2;stroke-dasharray:5 4;}
  .acc{stroke:#7F77DD;stroke-width:1.6;}
  .msg{fill:#2c2c2a;font-size:10px;}
  .mono{font-family:ui-monospace,monospace;}
</style>

<text x="28" y="28" class="ink" font-weight="700" font-size="16">Fraud-suspected revoke · four-eyes flow</text>
<text x="28" y="45" class="ink2 mono" font-size="11">services/bff/src/consents/fraud-revoke.ts · scope consents:admin:fraud-revoke</text>

<g class="mono" font-size="9.5" text-anchor="middle">
  <g><rect x="25" y="62" width="140" height="46" rx="7" class="ahead"/><text x="95" y="82" class="ink" font-weight="700">Risk analyst</text><text x="95" y="98" class="ink2" font-size="8">portal /care</text></g>
  <g><rect x="230" y="62" width="140" height="46" rx="7" class="head"/><text x="300" y="82" class="ink" font-weight="700">BFF</text><text x="300" y="98" class="ink2" font-size="8">consents/fraud-revoke</text></g>
  <g><rect x="400" y="62" width="140" height="46" rx="7" class="head"/><text x="470" y="82" class="ink" font-weight="700">Approvals</text><text x="470" y="98" class="ink2" font-size="8">four-eyes</text></g>
  <g><rect x="580" y="62" width="140" height="46" rx="7" class="head"/><text x="650" y="82" class="ink" font-weight="700">P6 egress</text><text x="650" y="98" class="ink2" font-size="8">→ Nebras</text></g>
  <g><rect x="765" y="62" width="140" height="46" rx="7" class="head"/><text x="835" y="82" class="ink" font-weight="700">Audit + STR</text><text x="835" y="98" class="ink2" font-size="8">high-class trail</text></g>
</g>
<line class="life" x1="95"  y1="108" x2="95"  y2="560"/>
<line class="life" x1="300" y1="108" x2="300" y2="560"/>
<line class="life" x1="470" y1="108" x2="470" y2="560"/>
<line class="life" x1="650" y1="108" x2="650" y2="560"/>
<line class="life" x1="835" y1="108" x2="835" y2="560"/>

<line class="call" marker-end="url(#s)" x1="95" y1="140" x2="296" y2="140"/>
<text x="100" y="135" class="msg mono">POST …/fraud-revoke { case_context }</text>
<line class="call" marker-end="url(#s)" x1="300" y1="172" x2="466" y2="172"/>
<text x="306" y="167" class="msg mono">requestApproval(consents.fraud_revoke)</text>
<line class="ret" marker-end="url(#s)" x1="300" y1="204" x2="99" y2="204"/>
<text x="100" y="199" class="msg mono" fill="#7F77DD">202 + approval_request (never inline)</text>

<line x1="40" y1="226" x2="880" y2="226" stroke="#e6e4dc" stroke-width="1"/>
<text x="40" y="244" class="ink2" font-size="9.5" font-style="italic">— second principal, same scope, different person —</text>

<line class="acc" marker-end="url(#sa)" x1="95" y1="266" x2="466" y2="266"/>
<text x="100" y="261" class="msg mono">approve(approval_id)  ✓ 2nd approver</text>
<line class="call" marker-end="url(#s)" x1="470" y1="298" x2="304" y2="298"/>
<text x="310" y="293" class="msg mono">execute()</text>
<line class="call" marker-end="url(#s)" x1="300" y1="330" x2="646" y2="330"/>
<text x="306" y="325" class="msg mono">revokeConsent(id, 'FRAUD_SUSPECTED')</text>
<line class="ret" marker-end="url(#s)" x1="650" y1="362" x2="304" y2="362"/>
<text x="330" y="357" class="msg mono">ack { acknowledged_in_ms } &lt; 5s</text>
<line class="call" marker-end="url(#s)" x1="300" y1="394" x2="831" y2="394"/>
<text x="306" y="389" class="msg mono">emit consent_revoked · str_draft_ref · compliance_notified</text>
<line class="ret" marker-end="url(#s)" x1="300" y1="426" x2="99" y2="426"/>
<text x="100" y="421" class="msg mono" fill="#7F77DD">200 { status:Revoked, propagation_ms, str_draft_ref }</text>

<rect x="28" y="456" width="844" height="62" rx="8" class="head"/>
<text x="44" y="478" class="ink2" font-size="10">• PSU notification <tspan font-weight="700">deferred</tspan> per fraud policy (psu_notified=false)   • STR draft is a reference only — submission is <tspan class="mono">BACKOFFICE-63</tspan> (Phase 2)</text>
<text x="44" y="498" class="ink2" font-size="10">• No direct egress: revoke flows through P6 only   • Both initiator &amp; approver hold <tspan class="mono">consents:admin:fraud-revoke</tspan> — narrow Risk scope</text>
<text x="44" y="513" class="ink2" font-size="9">Spec PR #26: four-eyes returns 202 + approval, never executes inline.</text>
</svg>
