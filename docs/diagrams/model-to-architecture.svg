  <text x="40" y="332" class="ink2 h">how this entity builds</text></g>
<g><rect x="560" y="268" width="396" height="78" rx="8" class="art"/>
  <text x="576" y="296" class="ink ttl mono">conventions · ports P1–P9 · design system</text>
