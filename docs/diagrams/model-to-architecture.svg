  <text x="576" y="388" class="ink ttl mono">audit · lineage · monitors · evidence</text>
  <text x="576" y="406" class="ink2 h">INSERT-only audit · BCBS 239 lineage · headless monitors</text>
  <text x="576" y="424" class="ink2 h">release-evidence bundle — always audit-ready</text></g>
