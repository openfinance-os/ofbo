  <text x="576" y="332" class="ink2 h">the architecture's shape &amp; standards</text></g>
<line class="e" marker-end="url(#trace-ar)" x1="326" y1="307" x2="556" y2="307"/>
<text x="441" y="301" text-anchor="middle" class="ink2" font-size="8.5">shaped →</text>
<g><rect x="24" y="360" width="300" height="78" rx="8" class="mdl"/>
  <text x="40" y="388" class="ink ttl">④ Continuous assurance</text>
