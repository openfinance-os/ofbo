      - { id: UX-09-POLISH, title: UX polish cluster (copy, wayfinding, boundaries), status: done, depends_on: [UI-09-OPS-CONSOLE], note: "Shipped: removed the recon emoji ('No open breaks. Queue clear.'); reworded 'High-class audited' -> 'Audited (high-sensitivity)'; humanized snake_case option LABELS in the revoke-reason/dispute-type/resolve-outcome selects (value stays the exact enum); collapsed-nav tooltips (title=label); breadcrumb nav on the break-detail page; new app/not-found.tsx. Already done elsewhere: the contrast token-pairing fix (UX-01/03 — verified no residual text-on-primary-on-container) and error.tsx/global-error.tsx (a prior DEMO-01 boundary). Split UX-09b for the two heavier items (audit-trail affordance near mutating actions + clear/dismiss the ?status= notice param — needs client history.replaceState). Tests: not-found.spec 1 + investigation breadcrumb + recon option-label update. Reviewers: hard-stop PASS, conformance CONFORMANT." }
