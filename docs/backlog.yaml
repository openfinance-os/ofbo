      - { id: BACKOFFICE-17, title: Single-consent revocation with reason code (<5s p99 to Nebras sim), status: done, note: "POST /consents/{id}:revoke-admin — reason_code TPP_REQUEST|CLIENT_INSTRUCTION|REGULATORY (FRAUD_SUSPECTED 400, reserved for -22); consents:admin at BFF+service; Idempotency-Key (no duplicate revoke); propagates via P6 egress to the Nebras sim Consent Manager (NEBRAS_SIM_URL), records nebras_propagation_ms + sla_met (<5s NFR-18); one High-class consent_revoked audit. P6 sim adapter now HTTP-calls the live sim (revoke_delay fault → real SLA breach in demo)", depends_on: [BACKOFFICE-16] }
      - { id: BACKOFFICE-18, title: Emergency PSU-wide bulk revocation (four-eyes), status: done, depends_on: [BACKOFFICE-17] }
      - { id: SPEC-FRAUD-REVOKE-FOUREYES, title: Spec-change PR - add x-four-eyes + 202 to revoke-fraud per binding BD-03 default; clarify reports:approve 200-vs-202; approval id format (human-approved merge), status: done, note: "spec PR #26 human-approved + merged 2026-06-15; revoke-fraud now x-four-eyes + 202, reports:approve four-eyes flag removed, approval ids format:uuid. Unblocks BACKOFFICE-22" }
      - { id: BACKOFFICE-22, title: Fraud-suspected revocation (narrow Risk scope) + STR draft, status: done, note: "POST /consents/{id}:revoke-fraud — narrow consents:admin:fraud-revoke (Risk), four-eyes (202 + approval via approvals primitive). On approval the consents.fraud_revoke op P6-revokes with FRAUD_SUSPECTED (<5s), auto-creates an STR draft ref (submission is -63), notifies Compliance via the High-class consent_revoked audit, defers PSU notification per fraud policy. case_context PII redacted at emission. Reuses approvals + P6 + audit; no new table/spec", depends_on: [BACKOFFICE-17, SPEC-FRAUD-REVOKE-FOUREYES] }
      - { id: BACKOFFICE-25, title: Care-surface token minting with act + sub claims (<=15 min), status: blocked, reason: "uncovered auth-path (CLAUDE.md rule 6): no contract endpoint exists; care token is a Platform Auth Service client_credentials token (P1 CareSurfacePort). Exposure surface is a human decision — see docs/adrs/0001-care-surface-token-minting.md" }
      - { id: BACKOFFICE-20, title: Unauthorized-payment investigation workflow, status: done, note: "GET /payments/{id}:admin (consent-validity-at-time-of-payment + CoP + Risk Info Block + IPP status), POST /disputes (one-click, Nebras-linked via P6, High-class dispute_created audit + lineage, Idempotency-Key keyed by subject), GET /disputes (list, cursor + state/psu filters). disputes:admin at BFF+service. Payments derived deterministically into @ofbo/synthetic-data; PgDisputeStore in @ofbo/db. DEFERRED to a dispute-lifecycle slice: PATCH /disputes/{id} state machine (§6.3.1) — spec has no GET-by-id (view via list). initiate-refund is -21/-62", depends_on: [BACKOFFICE-16] }
      - { id: BACKOFFICE-21, title: Next-business-day refund (four-eyes, SLA timer), status: done, note: "POST /disputes/{id}:initiate-refund — four-eyes-gated (202 + approval_request via the shared approvals primitive; never inline). On approval by a DIFFERENT disputes:admin principal, the disputes.initiate_refund operation moves the case → refund_initiated with refund_required_by = endOfNextBusinessDay (weekends paused) and refund_amount recorded; one High-class refund_initiated audit. PgDisputeStore.markRefundInitiated (RLS UPDATE + lineage). Ozone Connect dispatch is -62", depends_on: [BACKOFFICE-20] }
      - { id: BACKOFFICE-62, title: Refund via formal Ozone Connect refund flow (P6, 5 IPP status codes), status: done, note: "On four-eyes approval, the refund operation now dispatches via the P6 egress port's new dispatchRefund (Ozone Connect refund flow) using the dispute's originating_consent_id; the returned IPP status (5 codes: ACCC/ACSP/ACSC/RJCT/PDNG) is tracked in the approval execution_result + refund_initiated audit; refund_initiated_at is the RPSCS SLA-evidence timestamp. P6 port extended (sim returns ACSP; enterprise adapter unchanged — whole-port NotImplemented until M6). No spec change (IPP rides execution_result, an accepted extra)", depends_on: [BACKOFFICE-21] }
      - { id: BACKOFFICE-23, title: CBUAE inquiry response bundle per PSU (PDF+XLSX, <10 min), status: done, note: "POST /back-office/inquiries/psu — compliance:reports:generate, Idempotency-Key, 202 + Report. Aggregates the PSU's consents + payments/CoP + disputes + 24-mo consent trail into a compliance_report (new content jsonb, migration 0010) with a sha256 line-level integrity hash per record + an overall integrity_hash; status awaiting_approval (CBUAE submission is the four-eyes step in -35). PgComplianceReportStore (RLS + lineage; content PII-redacted). PDF/XLSX rendering is the report download surface (-35/-41); -23 produces the evidence-grade hashed content", depends_on: [BACKOFFICE-19] }

