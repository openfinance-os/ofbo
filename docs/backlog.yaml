  - name: UI-FIDELITY
    # Stitch-fidelity overhaul (ADR 0016, user direction 2026-06-21 — supersedes ADR 0012
    # Option 1). A live review vs the Stitch "Refined" screens confirmed: tokens are clean,
    # the entire gap is COMPOSITIONAL — no viz/panel primitives exist, so every screen
    # collapses to generic KPI cards + label/value tables on empty canvases. This track
    # builds the missing design layer and rebuilds each screen to its Stitch reference.
    # Same conventions as UI/UX (token-only, OpenAPI-bound, DEMO-bannered, scope-gated,
    # zero PII, four-eyes via 202). Stitch = appearance ONLY: never copy its inline
    # REVIEW/APPROVE buttons or mock numbers (see ADR 0016 behavioural guardrails).
    # Sequence: foundation + shell (no contract dependency, highest first-impression ROI) →
    # typed-sections spec-change (gate) → flagship bespoke → hand-built omissions → re-audit.
    items:
      - { id: UIF-01-VIZ-FOUNDATION, title: Token-bound presentation primitive library, status: done, depends_on: [UX-01-UI-PRIMITIVES-A11Y-GATE], note: "Shipped the no-new-dependency primitive layer in apps/portal/src/components/ui/ (ADR 0016): KpiStat (big-number font-mono tabular-nums + toned trend + sublabel; role=group/aria-label so it's never number-alone), StatStrip (the 3–4-up responsive metric row), SectionCard (named <section aria-labelledby> landmark like Panel + optional header action slot for the Stitch CTAs + meta slot), ContributionBar (horizontal stacked bar — the most common Stitch viz; drawn as an SVG 0–100 viewBox so proportional geometry sits in rect width/x ATTRIBUTES, not an inline style prop which the design-conformance gate forbids; aria-hidden bar + legend label/% so never colour-alone; token-only fill-* palette). StatusTag from the plan = the existing UX-01 StatusBadge (reused, not duplicated). TDD: uif-viz-primitives.spec 9 (incl. vitest-axe a11y) + the design-conformance gate auto-scans the 4 new files (no inline-style/hex/px). typecheck/lint/build green; 301 portal unit tests pass. No screen changes yet. The @visx charting lib + Gauge/Sparkline split to UIF-01b (a charting dependency on the OpenNext/Workers build deserves its own focused verification)." }
      - { id: UIF-01b-CHART-PRIMITIVES, title: "@visx charting lib + Gauge/Sparkline primitives", status: done, depends_on: [UIF-01-VIZ-FOUNDATION], note: "Shipped @visx (@visx/shape + @visx/scale + @visx/group) wrapped behind two 'use client' island primitives in apps/portal/src/components/ui/ (ADR 0016 D2): Gauge (270° radial dial — @visx Arc; ARIA role=meter with value/min/max + clamping; figure as centred mono text; track + value arc geometry in SVG path d-ATTRIBUTES, token fill-* only) and Sparkline (@visx LinePath + scaleLinear; labelled role=img; SVG path d-attribute, token stroke-secondary/fill-none; guards <2 points + empty). Screens never import @visx directly — only via ui/index. TDD: uif-chart-primitives.spec 8 (incl. vitest-axe). Gates green: gen no-drift, lint, typecheck, full unit 828, design-conformance scans the 2 new files clean (no inline-style/hex/px), Next build (First Load JS unchanged at 102 kB → @visx NOT in the shared/server bundle), AND the OpenNext/Cloudflare Worker build (.open-next/worker.js generated, exit 0) — the explicit Worker-bundle verification this story was split out for. No screen changes; first live consumption is UIF-03/-04/-06. Reviewers: hard-stop PASS, conformance CONFORMANT." }
      - { id: UIF-02-SHELL-FIRSTRUN, title: Sign-in + shell first-impression polish, status: done, depends_on: [UIF-01-VIZ-FOUNDATION], note: "Shipped (token-utility only, no contract change). Sign-in: persona-login-list is now a centred branded card (rounded-xl border + shadow on surface-container-lowest) led by an OFBO wordmark + 'Open Finance Back Office' product line; app/page centres it both axes (flex min-h-screen items-center justify-center) — replaces the top-left unstyled-prototype look; persona options keep the globals card styling. App shell: added a status FOOTER (role=contentinfo, data-testid=shell-footer — 'DEMO profile · synthetic data only · OFBO non-prod · egress via P6 · UAE region', à la the Stitch screens) and a max-width content container (shell-content-inner mx-auto max-w-screen-2xl) so wide screens don't stretch edge-to-edge. Density toggle already correct (UX-10) — left as-is; persona badge cluster left structurally unchanged (its testids are load-bearing in app-shell.spec). TDD: uif02-shell-firstrun.spec 5 (brand, preserved region/heading/buttons, axe; footer contentinfo, max-width inner). a11y.spec + app-shell.spec stay green (the new footer/card add no axe violations); design-conformance scans the changed files clean. Note: evaluate against a SEEDED BFF (set DATABASE_URL) for a data-populated first impression — empty in-memory mode shows empty states. Reviewers: hard-stop PASS, conformance CONFORMANT." }
      - { id: UIF-SPEC-TYPED-SECTIONS, title: "Spec-change: typed/named analytics sections in the analytics envelope", status: done, note: "Spec PR #181 HUMAN-APPROVED + MERGED 2026-06-22 (e8a8aef). AnalyticsView.data now carries an OPTIONAL sections: AnalyticsSection[] (kinds kpi-strip | gauge | contribution-bars | status-cards | alert | object-table + per-kind payloads AnalyticsStat/Gauge/ContributionSegment/StatusCard/Alert/Table + a StatTone enum), backward-compatible (data stays additionalProperties:true; unknown kinds degrade to the generic grid). Regenerated api-types are on main; post-merge gen no-drift + typecheck clean across all 9 projects. UNBLOCKS UIF-03/-04/-05 (each now: type the analytics envelope's sections → BFF producers emit typed sections → bespoke renderer maps kind→UIF-01/01b primitive)." }
      - { id: UIF-03-ANALYTICS-BESPOKE, title: Analytics & Insights bespoke panels (reopens UX-11), status: done, depends_on: [UIF-01-VIZ-FOUNDATION, UIF-01b-CHART-PRIMITIVES, UIF-SPEC-TYPED-SECTIONS], note: "Closed UX-11 + reopens the analytics screen as bespoke panels (ADR 0016 D1). PORTAL: AnalyticsSections (components/analytics/analytics-sections.tsx) — the shared typed-section renderer mapping each AnalyticsSection kind → a UIF-01/01b primitive (kpi-strip→StatStrip/KpiStat, gauge→Gauge, contribution-bars→ContributionBar, status-cards→toned cards, alert→callout, object-table→table; unknown kind→null). lib/analytics gained the contract-sourced AnalyticsSection type + sectionsOf(view) helper; AnalyticsSection wrapper renders bespoke sections when present else the generic MetricGrid (backward-compatible — existing free-form views unchanged). BFF: ExecutiveDashboardService.view now emits data.sections from LIVE metrics (no mock values), scope-gated like the angles — a Reconciliation-Pass-Rate gauge (base) + a Commercial-Metrics kpi-strip (TPP-AAS margin/Nebras fees/fintech charges formatted from integer minor units + integration-pipeline count) + a Margin-by-Product-Family contribution-bars (commercial:read only). TDD: uif03-analytics-sections.spec 8 (all 6 kinds + unknown-degrade + axe) + executive-dashboard.spec +2 (sections emitted; base-scope scope-hygiene). Gates: gen no-drift, lint, typecheck (all), full unit 873, design-conformance scans the new file clean, analytics-dashboard + a11y specs stay green (free-form backward-compat), executive-dashboard.int green vs local PG, build OK. Reviewers: hard-stop PASS, conformance CONFORMANT. The renderer is the shared core UIF-04 (Risk) + UIF-05 (Ops) reuse." }
      - { id: UIF-04-RISK-BESPOKE, title: Risk Management & Anomaly Detection bespoke panels, status: done, depends_on: [UIF-01-VIZ-FOUNDATION, UIF-01b-CHART-PRIMITIVES, UIF-SPEC-TYPED-SECTIONS], note: "Reused the UIF-03 typed-section renderer (the RiskDashboard already renders via the shared AnalyticsSection wrapper) → BFF-ONLY change, no portal changes. Both risk producers now emit data.sections from live data (no mock values), all risk:read: RiskViewService — a Risk-Signals kpi-strip (active/consent-anomaly/tpp-anomaly counts) + an Open-Signals-by-Severity contribution-bars (summary.by_severity); LiabilityViewService — a Liability-Events-by-Severity contribution-bars (monitor.by_severity) + an Approaching-Triggers object-table (issue/party/accrued_aed/severity). TDD: risk-view.spec +1 + liability-monitor.spec +1 (sections emitted, severity bars, triggers table). Gates: gen no-drift, lint, typecheck (all), full unit 875, build OK, risk-view.int + liability-monitor.int green vs local PG. Reviewers: hard-stop PASS, conformance CONFORMANT. PSU-PII discipline preserved (counts/refs only, no signal_data). UIF-05 (Operations) is the same pattern." }
      - { id: UIF-05-OPS-BESPOKE, title: Operations Console bespoke panels, status: done, depends_on: [UIF-01-VIZ-FOUNDATION, UIF-SPEC-TYPED-SECTIONS], note: "Reused the UIF-03 renderer (OperationsConsole already renders via the shared AnalyticsSection wrapper) → BFF-only change, no portal diff. OperationsConsoleService emits data.sections from live data (no mock values), platform:operations:read: a Platform-Health kpi-strip (active outages / TPP onboarding total / Nebras connectivity) + a TPP-Onboarding-Pipeline contribution-bars (pipeline by_state) + an Active-Outages object-table (title/component/severity/started_at). TDD: operations-console.spec +1 (sections emitted; kpi values; pipeline bars; outages table). Gates: gen no-drift, lint, typecheck, full unit 876, build OK, operations-console.int green vs local PG. Reviewers: hard-stop PASS, conformance CONFORMANT. COMPLETES the bespoke-screen tranche (UIF-03/-04/-05); only UIF-10 re-audit remains." }
      - { id: UIF-06-DASHBOARD-BESPOKE, title: Executive Command dashboard bespoke build, status: done, depends_on: [UIF-01-VIZ-FOUNDATION, UIF-01b-CHART-PRIMITIVES], note: "Added the two signature Stitch 'Executive Command' (d8515d63) elements the dashboard lacked, on the UIF-01/01b primitives + LIVE data (components/dashboard-command.tsx): (1) SystemHealthPanel — a SectionCard with the UIF-01b radial Gauge bound to the real reconciliation pass rate (latest completed run, from getDashboardCharts.reconTrend) = Stitch's System-Heartbeat dial; (2) FourEyesQueuePanel — a SectionCard listing listPendingApprovals as deep-links to /approvals/{id} with the UX-03c NON-PII operation_summary (humanised op type, formatSummaryMoney, counterparty, relative expiry via the reused formatExpiry), count chip, empty state. CRITICAL four-eyes posture: the queue NEVER renders inline approve/reject — execution stays 202 + approval BFF-side by a second principal (asserted in tests). Wired into app/dashboard (fetch the pending list + derive pass rate; both degrade gracefully on 403/empty). Existing DashboardOverview KPIs + hand-rolled trend/severity charts + AuditPanel kept (token-clean, working). TDD: dashboard-command.spec 6 (gauge meter + value; queue deep-links + money + NO approve/reject buttons + empty state + axe). Gates: gen no-drift, lint, typecheck, full unit 840, design-conformance scans the new file clean, build OK. Reviewers: hard-stop PASS, conformance CONFORMANT. Sparkline metric tiles (TPP traffic/error rate/settlement vol) deferred — they need analytics series the dashboard getters don't expose; revisit if those endpoints land." }
      - { id: UIF-07-RECON-THREEWAY, title: Reconciliation outcome viz (gauge + contribution bar), status: done, depends_on: [UIF-01-VIZ-FOUNDATION], note: "Shipped the real-data, no-blocked-dependency slice of the Stitch 'Reconciliation Console (Refined)' (46e55863): an additive ReconOutcomePanel (components/recon-outcome.tsx) = a UIF-01 SectionCard wrapping the UIF-01b Gauge (run pass rate) + the UIF-01 ContributionBar (matched/unmatched/disputed split), bound to the selected run's live counts, rendered after the existing KPI cards. The working/a11y-tested KPIs/run-list/break-queue are untouched (additive). TDD: uif07-recon-outcome.spec 3 (gauge meter + value, matched-segment proportional width, div-by-zero guard, axe). Gates: gen no-drift, lint, typecheck, full unit 843, design-conformance scans the new file clean, recon-console + recon-a11y specs stay green, build OK. Reviewers: hard-stop PASS, conformance CONFORMANT. The data-gated Stitch remainder (three-way SOURCE totals, margin-by-fintech, export/sign-off) is split to UIF-07b." }
