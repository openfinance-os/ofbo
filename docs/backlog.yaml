  - name: UI
    # Portal screen build-out from the Stitch project (8050269076066130289) "Regulated Institutional
    # Interface" design system. Division of truth: Stitch = appearance (layout + tokens);
    # specs/backoffice-openapi.yaml = behaviour + data. Every screen is token-only (no raw hex/px),
    # OpenAPI-bound (no Stitch mock values), DEMO-bannered, persona scope-gated, zero PII, four-eyes
    # via 202 + approval_request (never inline), and cites its Stitch screen id in the PR for
    # design<->code traceability. Positioned post-M5 to avoid disrupting the in-flight backend loop;
    # promote UI-00/01/02 earlier on request once the foundation is approved.
    items:
      - { id: UI-00-DESIGN-SYSTEM, title: Codify Stitch design.md as a repo-canonical Tailwind token preset, status: done, depends_on: [M1-PORTAL-SHELL], note: "Pull the 'Regulated Institutional Interface' design.md into apps/portal/design/ as the canonical token source; emit a Tailwind preset (Inter + JetBrains Mono scale, navy #0F172A primary, status semantics red=breach/amber=break/green=reconciled, 4px spacing, radii, density toggles). ADR in docs/adrs/ for adopting Tailwind. Migrate the M1 shell's plain globals.css onto tokens and RETIRE the ad-hoc --ofbo-* palette (reconcile, do not preserve). CI lint fails on raw hex/px in components. Push edits back to Stitch via upload_design_md. Relates to BACKOFFICE-26 (console design-system + Al Tareq brand conformance, M5)" }
      - { id: UI-01-APP-SHELL, title: App shell (sidebar/topbar, persona-switcher, scope-aware nav), status: done, depends_on: [UI-00-DESIGN-SYSTEM], note: "Refactor the existing flat portal-main layout into the design-system shell: 240px collapsible sidebar, 64px top bar, persona-switcher with role badge, global search slot, density toggle. Nav hides modules outside the persona scope matrix. ABSORB (do not recreate) the M1 components: demo-banner, scope-echo (-> persona-switcher/role-badge), audit-panel (-> audit-trail timeline). The login screen (app/page.tsx) stays - it is the one surface outside the Stitch set; restyle to tokens" }
      - { id: UI-02-CARE-CONSOLE, title: Customer Care Console screen (end-to-end proving run), status: done, depends_on: [UI-01-APP-SHELL], note: "Stitch 'OFBO - Customer Care Console (Hardened)' -> React (app/care): PSU Identity Lookup (native GET) + consent inventory + 24-mo event history + investigation module. Wired to shipped backends over the OpenAPI contract (lib/care, server-side; httpOnly token never in browser): -16 search, -19 timeline, -17 admin-revoke (reason_code, Idempotency-Key, P6->Nebras), -20 one-click dispute (server actions). consents:admin gates the screen (+ audit:read timeline, disputes:admin dispute); BFF re-enforces. NO PSU PII beyond the searched internal id (Stitch masked name/accounts are appearance-only). First full-pipeline proof: tokens->component->client->tests (care.spec 8 + care-console.spec 7). Reviewers: hard-stop PASS, conformance CONFORMANT. Build-ahead (CI/Actions billing-blocked): PR stacked on UI-01, not merged" }
      - { id: UI-03-RECON-CONSOLE, title: Reconciliation Console screen, status: done, depends_on: [UI-01-APP-SHELL], note: "Stitch 'OFBO - Reconciliation Console (Refined)' -> React (app/reconciliation, finance scope): KPI cards (matched/unmatched/disputed from the run line counts) + recent-run list + Break Queue (three-way source refs, claim->SLA clock->resolve). Wired over the OpenAPI contract (lib/reconciliation, server-side; httpOnly token never in browser): -01 listRuns, -02 listBreaks, -03 claimBreak (Idempotency-Key), -04/-06 resolveBreak (outcome+note>=20, Idempotency-Key). reconciliation:read gates the screen; finance:reconciliation:write gates claim/resolve (BFF re-enforces). BreakStatus state machine flagged->assigned->resolved/escalated drives the claim/resolve affordances; Money rendered as integer minor units. Tests: reconciliation.spec 8 + recon-console.spec 7. Reviewers: hard-stop PASS, conformance CONFORMANT (after aligning BreakStatus/run-status enums + dropping silent outcome coercion). Build-ahead (CI/Actions billing-blocked): PR stacked on UI-02, not merged. Feeds BACKOFFICE-15 (recon console WCAG 2.1 AA, M5)" }
      - { id: UI-04-INVESTIGATION, title: Investigation Detail View screen, status: done, depends_on: [UI-03-RECON-CONSOLE], note: "Stitch 'OFBO - Investigation Detail View' -> React (app/reconciliation/breaks/[break_id], finance scope): BACKOFFICE-11 three-source side-by-side diff (A=Nebras billing, B=bank platform metering-of-record, C=fintech billing, missing-source highlight) + break summary (variance/line-type/assignee/SLA) + BACKOFFICE-05 one-click Nebras dispute escalation. Wired over the OpenAPI contract (lib/reconciliation getBreak + escalateToNebras, server-side; httpOnly token never in browser). reconciliation:read gates the screen; finance:disputes:write gates escalation (escalatable only when flagged|assigned, BFF re-enforces); reopen (compliance+four-eyes) correctly excluded. Reached via the 'Investigate ->' link on the recon console break card. Tests: reconciliation.spec +3 + investigation-detail.spec 5. Reviewers: hard-stop PASS, conformance CONFORMANT. Build-ahead (CI/Actions billing-blocked): PR stacked on UI-03, not merged" }
      - { id: UI-05-FOUR-EYES, title: Four-Eyes Approval Portal screen, status: done, depends_on: [UI-01-APP-SHELL], note: "Stitch 'OFBO - Four-Eyes Approval Portal' -> React (app/approvals, cross-cutting): pending-approval queue, each as dual initiator/approver cards with permission lockouts (no self-approval — initiator locked out incl. superadmin; locked when lacking approver_required_scope). Wired over the OpenAPI contract (lib/approvals, server-side; httpOnly token never in browser): GET /approvals/pending + /{id}, POST :approve / :reject (reject_reason>=10, Idempotency-Key). NEVER executes inline — the BFF runs the gated op on approval by a second principal. Added an always-visible (scope:null) 'approvals' nav module; queue self-filters by approver scope server-side. Tests: approvals.spec 10 + approvals-portal.spec 6 (+ app-shell nav test updated). Reviewers: hard-stop PASS, conformance CONFORMANT (clean first pass). Build-ahead (CI/Actions billing-blocked): PR stacked on UI-04, not merged" }
      - { id: UI-06-ANALYTICS, title: Analytics & Insights Dashboard screen, status: done, depends_on: [UI-01-APP-SHELL, BACKOFFICE-27, BACKOFFICE-31], note: "Stitch 'OFBO - Analytics & Insights Dashboard' -> React (app/analytics): Executive Dashboard (-27, platform:analytics:read) + Finance View (-31, reconciliation:read), each entitlement-gated independently on the page (BFF re-enforces). Contract-first GENERIC renderer (analytics data is free-form by contract) — labelled metric grid with money/scalar/array/nested-object formatting (depth-capped, arrays capped at 8) + the mandatory data-freshness indicator (-40, {data,meta,freshness} envelope where freshness is a top-level sibling). nav.ts NavModule.scope extended to any-of (string|string[]|null) so 'analytics' shows to either audience. Read-only (no mutations). Tests: analytics.spec 8 + analytics-dashboard.spec 5 (+ app-shell any-of nav test). Reviewers: hard-stop PASS, conformance CONFORMANT (after dropping a non-contract period query param from getFinanceView). Build-ahead (CI/Actions billing-blocked): PR stacked on UI-05, not merged" }
      - { id: UI-07-RISK, title: Risk Management & Anomaly Detection screen, status: done, depends_on: [UI-01-APP-SHELL, BACKOFFICE-30], note: "Stitch 'OFBO - Risk Management & Anomaly Detection' -> React (app/risk, narrow risk:read scope): Risk View (-30, GET /back-office/analytics/risk-view — typed signals + the consent-pattern anomaly feed -37) + proactive Nebras-liability monitor (-36, GET /nebras-liability-monitor). Both are the same {data,meta,freshness} free-form analytics envelope, so lib/risk reuses the shared getAnalyticsView getter and the component reuses the UI-06 generic renderer (AnalyticsSection) + data-freshness indicator (-40). Read-only; server-side (httpOnly token never in browser); BFF re-enforces risk:read. Tests: risk.spec 3 + risk-dashboard.spec 3. Reviewers: hard-stop PASS, conformance CONFORMANT (clean first pass). Build-ahead (CI/Actions billing-blocked): PR stacked on UI-06, not merged" }
      - { id: UI-08-TPP-BILLING, title: TPP Billing & Registry screen, status: done, depends_on: [UI-01-APP-SHELL, BACKOFFICE-71], note: "Stitch 'OFBO - TPP Billing & Registry' -> React (app/tpp-billing, Finance scope): consuming-TPP registry table (-71, billing:read; production_status/registration_state pills, unbilled-traffic flag, MTD fee accrual) + monthly invoice-runs table (-73). Mutations: per-row P9 register (-72, billing:write, 202) for not-yet-registered TPPs; create invoice run (-73, billing:write, FOUR-EYES 202+approval_request — submitted to the approvals queue, never dispatched inline); directory sync (-71, platform:operations:write — hidden for the finance persona). Wired over the OpenAPI contract (lib/tpp-billing, server-side; httpOnly token never in browser); Idempotency-Key on all mutations; BFF re-enforces every scope. Added a 'billing' nav module (billing:read). Tests: tpp-billing.spec 8 + tpp-billing-dashboard.spec 4. Reviewers: hard-stop PASS, conformance CONFORMANT (after fixing REGISTERABLE_STATES to the contract registration_state enum + tightening directory_synced_at to non-nullable). Build-ahead (CI/Actions billing-blocked): PR stacked on UI-07, not merged" }
      - { id: UI-09-OPS-CONSOLE, title: Operations Console screen, status: done, depends_on: [UI-01-APP-SHELL, BACKOFFICE-28], note: "Stitch 'OFBO - Operations Console' -> React (app/operations, platform:operations:read): the aggregate ops view (-28) which folds in SLO observations (-58), scheme-certificate expiry (-66), Ozone connectivity + active outages — one {data,meta,freshness} free-form analytics envelope, so lib/operations reuses the shared getAnalyticsView getter and the component reuses the UI-06 generic renderer (AnalyticsSection) + data-freshness indicator (-40). Read-only; server-side (httpOnly token never in browser); BFF re-enforces platform:operations:read; pre-existing 'operations' nav module routes here. Tests: operations.spec 3 + operations-console.spec 3. Reviewers: hard-stop PASS, conformance CONFORMANT (clean first pass). Build-ahead (CI/Actions billing-blocked): PR stacked on UI-08, not merged. COMPLETES the UI-00..09 track" }

  - name: UX
    # UX-hardening track from the full UI/UX review (docs/ui-ux-review.md, 2026-06-21).
    # The portal is functionally complete but built per-screen not per-system; these items
    # propagate the proven recon a11y pattern, close operator-safety/trust gaps, and unify
    # the visual primitives. Same conventions as the UI track (token-only, OpenAPI-bound,
    # DEMO-bannered, persona scope-gated, zero PII). Tier-1 (operator/AA-readiness) first.
    items:
      - { id: UX-01-UI-PRIMITIVES-A11Y-GATE, title: Shared components/ui primitives + propagate recon a11y pattern + jest-axe Q-gate, status: done, depends_on: [UI-09-OPS-CONSOLE], note: "Highest-leverage fix from the UI/UX review. Extract StatusBadge + KpiCard + Panel into apps/portal/src/components/ui/ (one shared statusTone map — the analytics one is most complete; one KPI value ramp e.g. text-3xl font-mono tabular-nums) and adopt across care/recon/analytics/risk/ops/tpp/approvals to kill the status-color + KPI-size drift. Propagate the BACKOFFICE-15 recon a11y pattern to ALL screens: role=status on *-notice, role=alert on *-error, focus-visible:ring on every interactive control (or a global :focus-visible in globals.css), <section aria-labelledby> regions, sr-only counts, skip-to-content link, prefers-reduced-motion. Add a shared jest-axe a11y spec over every screen wired into the Q-gate so the next screen can't merge without it. Closes the CRITICAL a11y regressions + most visual-drift findings together." }
      - { id: UX-02-ACTION-CONFIRMATIONS, title: Confirmation + forced-choice on irreversible external actions, status: done, depends_on: [UI-09-OPS-CONSOLE], note: "Operator safety + audit data-quality. Add a review-then-confirm step before the single-click irreversible/external actions: consent revoke (care-console), escalate-to-Nebras (investigation-detail), approve-gated-op (approvals-portal). Remove silent enum defaults recorded on audited actions: revoke reason_code and resolve resolution_outcome must require an explicit choice (no preselected first value). Confirmation summarises the substance (TPP/reason, three-way variance, amount/target) before dispatch." }
      - { id: UX-03-FOUR-EYES-LOOP, title: Four-eyes initiator feedback (approval-id + deep-link + expiry urgency), status: done, depends_on: [UI-09-OPS-CONSOLE], note: "Delivered the unblocked frontend parts (user-chosen scope): the invoice-run server action now captures approval_request_id and surfaces it (+ a deep-link to /approvals) in the initiator notice (TppBilling.notice widened string→ReactNode); approval cards show relative expiry via a pure formatExpiry(expiresAt, now) helper with an expiring-soon (≤30m) urgency tone. Split out: UX-03b (pending-count nav badge) + UX-03c (operation payload on cards — blocked, contract is PII-redacted by design). Tests: ux03-foureyes-feedback.spec 7. Reviewers: hard-stop PASS, conformance CONFORMANT." }
      - { id: UX-03b-APPROVALS-NAV-BADGE, title: Pending-approvals count badge on the Approvals nav item, status: done, depends_on: [UX-03-FOUR-EYES-LOOP], note: "Shipped: a cached shellBadges(token) helper (React cache()) derives the pending count from the existing listPendingApprovals and returns ONLY the integer length (no PII/records cross to the client); AppShell gained an optional badges prop and renders a count chip (capped 9+, aria-label 'N pending') on the matching nav item, a dot when collapsed. Threaded into all 11 AppShell pages (token-guarded; +1 cached BFF GET per nav, tolerant of a cold BFF -> no badge). Approach chosen: per-page fetch (each page renders its own shell). Tests: app-shell.spec +2. Reviewers: hard-stop PASS, conformance CONFORMANT." }
      - { id: UX-03c-APPROVAL-CARD-PAYLOAD, title: Operation context on approval cards, status: done, reason: "ADR 0014 ACCEPTED (Option 2). Spec PR #171 MERGED (operation_summary + ApprovalOperationSummary on ApprovalRequest). BFF step DONE (this PR): summariseOperation allowlist composes a NON-PII operation_summary in toWire per gated-operation type — only billing_period (regex-validated YYYY-MM), reason_code (enum-validated, CLIENT_INSTRUCTION only), refund Money (integer minor units), + static labels; psu_identifier, free-text case_context/justification, internal ids, account/IBAN/Emirates-ID NEVER copied; unknown type → null. Format-validation at the summary boundary (security-review hardening) so the generic POST /approvals route can't smuggle PSU free-text onto the four-eyes surface. Per-type PII-redaction contract test (12 cases). Reviewers: hard-stop PASS, conformance CONFORMANT. REMAINING: UX-03c-portal — render operation_summary on the approval card (approvals-portal) + the mobile detail (approval-detail)." }
      - { id: UX-03c-portal, title: Render operation_summary on the approval card + mobile detail, status: done, depends_on: [UX-03c-APPROVAL-CARD-PAYLOAD], note: "Final UX-03c step: the contract + BFF now provide a NON-PII operation_summary on ApprovalRequest. Add it to the portal ApprovalRequest type (lib/approvals) and render it on ApprovalCard (approvals-portal) + ApprovalDetail (mobile) — amount via formatMoney, descriptor, counterparty_label — so the second four-eyes approver sees real context. Display-only; zero new PII (the BFF already redacted)." }
      - { id: UX-04-PAGINATION, title: Expose cursor-based pagination (recon + TPP lists), status: done, depends_on: [UI-09-OPS-CONSOLE], note: "Added a reusable server-rendered LoadMore control (components/ui/load-more.tsx: a 'N shown · more available' indicator + a forward 'Next page →' link) and wired the four lists whose getters already accept a cursor: recon runs (runs_cursor) + break queue (breaks_cursor), TPP registry (reg_cursor) + invoice runs (inv_cursor). Pages read per-list cursor params, pass cursor to the getter, capture next_cursor, build the next-page href (recon preserves run_id). No more silent truncation on these. Split UX-04b for approvals + care-timeline (their getters need a cursor param + lib-test updates). Tests: load-more.spec 5. Reviewers: hard-stop PASS, conformance CONFORMANT." }
      - { id: UX-04b-PAGINATION-APPROVALS-TIMELINE, title: Cursor pagination for the approvals queue + care 24-month timeline, status: done, depends_on: [UX-04-PAGINATION], note: "The remaining two truncating lists. listPendingApprovals(token, deps) and the care timeline getter don't take a cursor arg yet (the BFF endpoints support it — they return next_cursor). Extend both getters to accept { cursor?, limit? } (mind the existing (token, deps) call sites + lib tests — tests ride the change), then wire LoadMore into ApprovalsPortal + the care TimelinePanel exactly like UX-04 (per-list cursor param, preserve the care identifier params)." }
      - { id: UX-05-LOADING-IDEMPOTENCY, title: Submitting states + stable idempotency keys, status: done, depends_on: [UI-09-OPS-CONSOLE], note: "Added SubmitButton (client, useFormStatus → disabled + pending label during the server action) + IdempotencyField (server, hidden idempotency_key minted at render) and a lib/idempotency.ts helper. Wired into every mutating form (care revoke/dispute, recon claim/resolve, tpp register/sync/invoice, approvals approve/reject); all 9 server actions now read the form-embedded key instead of minting a per-call random one, so a double-submit of the same rendered form dedupes in the BFF 24h window while a reload can retry. tpp syncDirectoryAction gained a formData param. Split UX-05b for per-route loading.tsx skeletons (lower value, 10 route files). Tests: ux05-submit-idempotency.spec 7. Reviewers: hard-stop PASS, conformance CONFORMANT." }
      - { id: UX-05b-LOADING-SKELETONS, title: Per-route loading.tsx skeletons (streaming feedback on cold BFF), status: done, depends_on: [UX-05-LOADING-IDEMPOTENCY], note: "Already satisfied: a root app/loading.tsx (DEMO-01, prior session) renders a token-styled animate-pulse skeleton as the Suspense fallback for ANY route navigation under app/ — one file covers all routes (Next nests the nearest loading.tsx). Verified present; no further work needed." }
      - { id: UX-06-ERROR-ENVELOPE, title: Parse + render error-envelope remediation/docs_url, status: done, depends_on: [UI-09-OPS-CONSOLE], note: "Part 1 (read path) shipped: the 4 portal lib error classes (Care/Approval/Recon/TppBilling) now carry remediation + docsUrl, and their envelope() parsers read error.remediation + error.docs_url (already REQUIRED in the spec ErrorEnvelope — the client was ignoring them). ErrorBanner renders the remediation line + a docs_url link (http(s)-guarded, new tab, noopener). The care + reconciliation read paths forward the typed error's remediation/docsUrl to the banner (recon-error now uses the shared ErrorBanner). Split UX-06b for parts 2+3 (write path): both need a useActionState refactor, so they ship together. Tests: ux06-error-envelope.spec 4. Reviewers: hard-stop PASS, conformance CONFORMANT." }
      - { id: UX-06b-WRITE-PATH-ACTIONSTATE, title: Write-path real error code + form-input preservation (useActionState) — Care slice, status: done, depends_on: [UX-06-ERROR-ENVELOPE], note: "Established the useActionState pattern on the CARE write path (revoke + dispute). Both care actions changed from (formData)->redirect('?status=*_failed') to (prevState, formData)->Promise<CareWriteResult>: on a typed CareApiError they RETURN { ok:false, error, remediation, docsUrl, values } (no redirect) so the form shows the real BFF error + remediation in place (UX-06) AND preserves the operator's inputs; success still redirects for the notice. Forms became 'use client' islands (RevokeForm/DisputeForm) using useActionState; inputs re-seeded from values via key+defaultValue (works in browser + jsdom). CareWriteResult lives in lib/care (a 'use server' file may only export async fns). values stay client-side (NOT in the URL) — reviewer noted this strictly improves PII posture vs the old failure redirect. Tests: ux06b-write-path.spec 2. Reviewers: hard-stop PASS, conformance CONFORMANT." }
      - { id: UX-06c-WRITE-PATH-ACTIONSTATE-REST, title: Apply the useActionState pattern to recon + approvals, status: done, depends_on: [UX-06b-WRITE-PATH-ACTIONSTATE], note: "Applied the proven Care pattern to RECON (claim, resolve) + APPROVALS (approve, reject). ReconWriteResult/ApprovalWriteResult added to their lib modules; actions -> (prevState, formData) returning the typed error on failure (no redirect) + redirect on success; forms extracted to 'use client' useActionState islands (claim-form/resolve-form, approve-form/reject-form) with ErrorBanner-from-state; free-text inputs (resolution note, reject reason) + the resolution outcome re-seeded via key+defaultValue. Four-eyes intact (approve still submits approval_id; BFF executes). resolve enum guard preserved (now returns error in place). Reviewer: PII posture improves (free-text stays client-side, not in URL). Tests: ux06c-write-path.spec 2 + 3 spec noops retyped. Reviewers: hard-stop PASS, conformance CONFORMANT." }
      - { id: UX-06d-WRITE-PATH-ACTIONSTATE-INVESTIGATION-TPP, title: Apply the useActionState pattern to investigation escalate + tpp register/invoice/sync, status: done, depends_on: [UX-06c-WRITE-PATH-ACTIONSTATE-REST], note: "COMPLETES the write-path refactor. Investigation escalate-to-Nebras (reuses ReconWriteResult) + tpp register/invoice-run/sync (new TppWriteResult in lib/tpp-billing) converted to (prevState, formData)->Promise<result>: typed BFF error rendered in place on failure (no redirect); invoice-run preserves billing_period+record_set_id via key+defaultValue; forms extracted to 'use client' islands (reconciliation/escalate-form, tpp-billing/{register,invoice-run,sync}-form). Egress intact (escalate via BFF->P6); four-eyes intact (invoice-run still 202 + success redirect ?ar=<approval id>); PII improves (inputs client-side, not in URL). 4 spec noops retyped. Tests: ux06d-write-path.spec 2. Reviewers: hard-stop PASS, conformance CONFORMANT. Every mutating portal form is now useActionState (care UX-06b, recon+approvals UX-06c, investigation+tpp UX-06d). The optional read-path remediation wiring for tpp/analytics/risk is a small follow-on if wanted." }
      - { id: UX-06e-READPATH-REMEDIATION-REST, title: Finish read-path remediation wiring (approvals/tpp/analytics/risk), status: done, depends_on: [UX-06-ERROR-ENVELOPE], note: "Completes UX-06 part 1 across the remaining consoles. Extended AnalyticsApiError (+remediation/+docsUrl) + its envelope to parse error.remediation/docs_url (the other 4 lib clients already did; analytics/risk share this envelope). The approvals/tpp-billing/analytics/risk pages now capture the typed error's remediation/docsUrl (analytics+risk from the first typed error across their multi-source fetches) and forward errorRemediation/errorDocsUrl → the shared ErrorBanner. Display-only operator guidance (already REQUIRED in the spec ErrorEnvelope); no PSU PII, no contract change. Every console's read-path error banner now surfaces remediation + the http(s)-guarded docs link. Tests: analytics.spec +1 (envelope remediation parse). Reviewers: hard-stop PASS, conformance CONFORMANT." }
