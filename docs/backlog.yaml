deferred: # Could / Phase 2 — not in build scope until promoted by the user
  # BACKOFFICE-60 and BACKOFFICE-53 fleshed out under ADR 0017 (agent-first MCP gateway,
  # services/mcp-gateway). ADR 0017 ACCEPTED 2026-06-23 — step-1 groundwork landed:
  # real MCP stdio transport (read-only), least-privilege agent personas with a
  # build-time subset invariant against the real SCOPE_MATRIX, and the spend-control
  # anomaly hook. Remaining: the DCR registration ENDPOINT is a new auth path → needs a
  # human-approved spec-change PR first (CLAUDE.md rule 6), so both stay deferred.
  - id: BACKOFFICE-60
    title: Programmatic admin-scope access for internal automation (DCR-registered agents)
    status: done
    priority: Could
    adr: docs/adrs/0017-agent-first-mcp-gateway.md
    progress: >-
      Contract merged (#241); BFF agent-registry implemented (#243): POST :register
      (four-eyes via ApprovalsService → 202), GET list/get, POST :revoke (single-actor
      kill switch); dedicated platform-admin persona (platform:agents:read/write only);
      scopes bound server-side from the AGENT_PERSONAS catalogue (no DCR scope escalation),
      never platform:superadmin; High-class audit on register/revoke. Durable path landed:
      migration 0027_agent_registry (RLS + retention 24/60 + classification), PgAgentStore
      with BCBS 239 lineage at write time (added to the Q4.5 gate table set), worker-wired.
      Gateway step-1 groundwork (#240). Hard-stop PASS + conformance CONFORMANT.
    remaining: >-
      Portal Agent Registry screen + registry-driven gateway both landed: the
      @ofbo/mcp-gateway now adopts a registered, four-eyes-APPROVED agent's bound identity
      (scopes, allow_mutations, spend_budget) from GET /back-office/agents/{id}
      (fetchAgentRegistration + sessionFromRegistration; demo:registry server proves the
      loop end to end). DoD met: contract, RBAC, four-eyes, audit, lineage, portal surface,
      agent-first loop. Production identity story now landed too (ADR 0018 Option 2): the
      gateway mints + presents a server-verified agent SESSION token (:mint-session), and the
      BFF verifies it as a first-class agent Principal — replacing the demo's borrowed
      derived_from human token. Full DCR client-credentials + mTLS (Option 1) is the M6 swap.
    blocked_on: none
    note: >-
      Gives a model/automation the same operations a human persona performs today,
      via the MCP gateway (services/mcp-gateway) over the existing OpenAPI contract.
      Adds NO new enforcement path — auth, RBAC, four-eyes, audit, lineage stay BFF-side.
    acceptance:
      - Agent identity is minted via Dynamic Client Registration (DCR); registration is itself
        a four-eyes-approved operation (202 + approval_request), human-ratified before the agent
        can authenticate.
      - Each agent binds to an agent persona whose scopes are a STRICT SUBSET of an existing
        human persona's scopes (SCOPE_MATRIX in services/bff/src/auth.ts) — least privilege;
        a superset is an automatic review FAIL.
      - Agent identities are service accounts and are REJECTED for platform-super-admin at
        sign-in (BACKOFFICE-80 already enforces isServiceAccountSubject) — no agent ever holds
        platform:superadmin.
      - Every agent tool call emits exactly one High-class audit event with acting_principal=agent,
        scope_used, and the propagated x-fapi-interaction-id; PII redacted at emission; zero PII in
        the agent's prompt/transcript/context store.
      - Four-eyes operations (fourEyes:true in ROUTES) return 202 to the agent and are ratified by
        a DIFFERENT, human principal — the agent never closes the approval loop (self-approval
        rejected at the service layer).
      - Mutating tools stay disabled until BACKOFFICE-53 (spend-control) is built; the initial
        enablement is read-only (fourEyes:false, *:read / audit:read scopes only).
      - The tool catalogue is generated from @ofbo/contracts ROUTES — contract drift surfaces as a
        catalogue diff (spec stays ground truth for the agent surface).
      - Idempotency-Key is sent on every mutating tool call (agents retry); replay within 24h
        returns the original result with no duplicate audit emit.
    depends_on: [BACKOFFICE-44, BACKOFFICE-45, BACKOFFICE-80]
  - id: BACKOFFICE-53
    title: Agentic spend-control for admin-scope MCP tools
    status: done
    priority: Could
    adr: docs/adrs/0017-agent-first-mcp-gateway.md
    progress: >-
      Gateway-side spend-control complete: SpendGuard caps per-session consequential ops
      (four-eyes counts at INITIATION) and blocks further mutations on exhaustion; budgets
      are per-agent-persona config (AGENT_PERSONAS spend_budget, default read-only). On
      threshold crossing BffBackedAnomalySink raises a REAL agent_anomaly Risk signal +
      P3 ITSM ticket — reusing the BACKOFFICE-80 auto-raise sinks, no PSU PII.
      BFF-SIDE re-assertion now done (ADR 0018 Option 2 accepted + built): an agent presents
      a server-verified session token (P2 mintAgentSession/verifyAgentSession), the BFF auth
      middleware builds a first-class agent Principal (agent_id + session_id), and a BFF
      spend-control middleware re-asserts allow_mutations (403) + per-(agent_id, session_id)
      budget (429), raising agent_anomaly Risk + ITSM BFF-side on exhaustion. Defence in
      depth holds: gateway pre-flight AND BFF re-assertion, the gateway never the sole guard.
      All criteria met. Tested at every layer (port round-trip, BFF middleware + integration,
      gateway loop incl. immediate revoke-kills-session).
    blocked_on: none
    note: >-
      Per-session blast-radius budget on consequential agent operations, mirroring the
      BACKOFFICE-80 per-session guardrail pattern. Bounds damage from a confused or
      adversarially-prompted agent.
    acceptance:
      - A per-session budget caps the count of consequential operations (initiated revokes,
        refunds, sign-offs, report/invoice runs) an agent may perform before it MUST escalate
        to a human; exceeding it blocks further mutations for the session.
      - Each session-budget threshold crossing raises a Risk signal (type agent_anomaly) and an
        informational ITSM ticket — the BACKOFFICE-80 auto-raise pattern, reused not reinvented.
      - Budgets are configured per agent persona (config, not code) and default to the most
        restrictive (read-only) until explicitly raised by a human.
      - Spend-control is enforced at the MCP gateway as a pre-flight check AND re-asserted by the
        BFF (defence in depth) — the gateway is never the sole guard.
      - Four-eyes operations count against the budget at INITIATION (the 202), not at approval.
    depends_on: [BACKOFFICE-60]
  - id: BACKOFFICE-59
    title: Training environment for Customer Care
    status: in-progress
    priority: Could
    progress: >-
      Modelled as a SEPARATE app composition (an environment, not a per-request flag) so audit
      isolation is absolute — the training environment shares no sinks with production.
      createApp({ training: true }) wires: (a) a distinct synthetic-PSU dataset (separate seed,
      same generator → mirrors production shape, different records), (b) a TrainingHighClassAuditSink
      that is NEVER the production audit_high_sensitivity writer and stamps training:true, and
      (c) a sandbox Nebras egress so a practised revoke/dispute never propagates. The BFF marks
      every training response x-ofbo-environment=training; a TRAINING Worker (OFBO_TRAINING=true)
      short-circuits to the in-memory training app before any Pg store is built. Portal delivers
      a persistent TRAINING pill (NEXT_PUBLIC_OFBO_TRAINING=true, token-only violet marker, the
      portal twin of the Worker flag). Remaining: M6 wires a training_audit table behind the sink.
    note: >-
      Lets Customer Care agents rehearse the real workflows (PSU search, consent admin,
      revoke, disputes) against synthetic data with zero production side-effects — for
      onboarding/certification without risk to real PSUs or the production audit trail.
    acceptance:
      - The training environment serves a synthetic-PSU dataset that MIRRORS production's shape
        (same generator) but is a SEPARATE set of records (distinct seed) — a trainee can never
        act on a real operator's PSU.
      - Training actions NEVER write to the production audit (audit_high_sensitivity): the
        training High-class audit sink is structurally separate and is never the production
        emitter, even when a production emitter is otherwise configured.
      - Training mutations (revoke, dispute, refund) never propagate to the real scheme — a
        sandbox egress acknowledges them locally so nothing real moves.
      - Every training response is marked (x-ofbo-environment=training) so the portal can render
        a persistent TRAINING banner, distinguishing it from production at a glance.
      - The OpenAPI contract is unchanged — training is a deployment/composition variant over the
        same Customer Care endpoints, so RBAC, four-eyes, and scope hygiene are identical.
