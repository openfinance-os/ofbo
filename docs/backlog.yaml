# OFBO build backlog — machine-readable work queue derived from PRD §7 + §9.
# Consumed by .claude/skills/next-story (the autonomous build loop).
#
# Rules:
#   - Items execute in file order within a milestone; milestones execute in file order.
#   - status: pending | in-progress | done | blocked | deferred
#   - An item is eligible when status=pending and every depends_on is done.
#   - blocked items carry a `reason:` and wait for a HUMAN decision — the loop skips them.
#   - Status changes ride the story PR (in-progress → done); blocker annotations may be
#     committed straight to main.
#   - id: BACKOFFICE-NN = PRD §7 requirement; M*-UPPER = infrastructure work item from §9.

