# M1-DEMO-DEPLOY: auto-deploy on merge (PRD §9 — "deploy early, deploy always").
# Merge policy already gates merges on CI (Q1–Q3), so this workflow deploys what
# a green PR produced, then runs the smoke acceptance suite against the LIVE
# demo environment — a broken demo fails the pipeline, not the next visitor.
#
# Secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, RAILWAY_TOKEN (project
# token scoped to ofbo-demo/production), DATABASE_URL (smoke audit assertion).
name: deploy

on:
  push:
    branches: [main]

concurrency:
  group: demo-deploy
  cancel-in-progress: false

jobs:
  # Keep the demo DB migrated + populated with the rich "operating back office" scenario so
  # the hosted demo shows real depth (recon history, break queue, four-eyes approvals, risk
  # signals, disputes) — not empty consoles. Both steps are idempotent and synthetic-only;
  # the demo environment is permanently non-prod (zero real PSU data).
  seed-demo:
    name: DB → migrate + rich demo seed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: apply migrations + seed the demo scenario
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm db:apply && pnpm db:seed:demo

  deploy-bff:
    name: BFF → Cloudflare Workers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: wrangler deploy
        working-directory: services/bff
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy

  deploy-portal:
    name: Portal → Cloudflare Workers (OpenNext)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: OpenNext build
        working-directory: apps/portal
        run: pnpm exec opennextjs-cloudflare build
      - name: deploy
        working-directory: apps/portal
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec opennextjs-cloudflare deploy
      - name: set DATABASE_URL secret (audit write + read path)
        working-directory: apps/portal
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: printf '%s' "$DATABASE_URL" | pnpm exec wrangler secret put DATABASE_URL

  deploy-sim:
    name: Nebras simulator → Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: railway up
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: npx -y @railway/cli@4 up --service nebras-sim --ci

  smoke:
    name: Smoke — demo URL live
    needs: [seed-demo, deploy-bff, deploy-portal, deploy-sim]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: smoke suite against the deployed demo
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SIM_ADMIN_TOKEN: ${{ secrets.SIM_ADMIN_TOKEN }}
        run: pnpm test:smoke
