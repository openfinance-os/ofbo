# Quality gates per release (CLAUDE.md): Q1 build+unit, Q2 static analysis+SAST,
# Q3 integration+contract tests, Q4 security review+dependency scan, Q4.5 BCBS 239
# lineage validation (P7). A failed gate blocks merge. Q5 (manual prod approval)
# is evidenced at release time (BACKOFFICE-57 bundle), not on every PR.
name: ci

on:
  push:
    branches: [main]
  pull_request:

# Supersede in-progress runs for the same branch/PR: a new push cancels the stale
# run rather than letting both consume runners (deploy.yml/release-evidence.yml
# already do this). Distinct groups per ref so branches never cancel each other.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  q1-build-unit:
    name: Q1 — build + unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm gen
      - name: Generated artifacts are committed and current
        run: git diff --exit-code packages/contracts/src/*.generated.ts
      - run: pnpm build
      - run: pnpm test

  q2-static-sast:
    name: Q2 — static analysis + SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - name: semgrep (SAST)
        run: |
          pipx install semgrep
          semgrep scan --config p/typescript --error --exclude '*.generated.ts'

  q2b-docs-integrity:
    name: Q2b — documentation integrity (anti-drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      # Deterministic, no install needed: fails if a current-state doc references a file that no
      # longer exists, or if two ADRs share a number. The doc analogue of Q1's generated-artifact
      # diff-check (HARNESS-05, ADR 0020).
      - run: node scripts/doc-link-check.mjs

  q3-integration-contract:
    name: Q3 — integration + contract
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ofbo
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ofbo
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:apply
      - run: pnpm db:seed
      - run: pnpm test:integration

  q3-e2e:
    name: Q3 — portal E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ofbo
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ofbo
      BFF_URL: http://localhost:8787
      NEBRAS_SIM_URL: http://localhost:8788
      SIM_ADMIN_TOKEN: ci-demo-token-not-a-secret
      DEPLOY_PROFILE: demo
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm gen
      - run: pnpm db:apply
      - run: pnpm db:seed
      - name: install Playwright Chromium
        run: pnpm --filter @ofbo/portal exec playwright install --with-deps chromium
      # The E2E drives the full demo stack: Nebras sim + BFF + a production portal build.
      - name: start Nebras sim + BFF
        run: |
          (cd services/nebras-sim && PORT=8788 ADMIN_TOKEN="$SIM_ADMIN_TOKEN" pnpm exec tsx scripts/serve.ts > /tmp/sim.log 2>&1 &)
          (cd services/bff && PORT=8787 pnpm exec tsx scripts/serve.ts > /tmp/bff.log 2>&1 &)
          # Bounded readiness wait: fail (with the service log) after 90s instead of
          # hanging until the job timeout if a service never comes up.
          wait_for() {
            local name="$1" log="$2"; shift 2
            local deadline=$((SECONDS + 90))
            until "$@" >/dev/null 2>&1; do
              if [ "$SECONDS" -ge "$deadline" ]; then
                echo "::error::$name did not become ready within 90s"
                tail -n 50 "$log" || true
                exit 1
              fi
              sleep 1
            done
            echo "$name ready"
          }
          wait_for "Nebras sim" /tmp/sim.log curl -sf http://localhost:8788/tpp-reports/2026-05
          wait_for "BFF" /tmp/bff.log curl -s -o /dev/null http://localhost:8787/
      - name: build + start portal
        run: |
          pnpm --filter @ofbo/portal build
          (cd apps/portal && PORT=3000 pnpm start > /tmp/portal.log 2>&1 &)
          deadline=$((SECONDS + 90))
          until curl -sf http://localhost:3000 >/dev/null 2>&1; do
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "::error::portal did not become ready within 90s"
              tail -n 50 /tmp/portal.log || true
              exit 1
            fi
            sleep 1
          done
          echo "portal ready"
      - run: pnpm --filter @ofbo/portal e2e
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: apps/portal/playwright-report
          retention-days: 7

  q4-security-deps:
    name: Q4 — security review + dependency scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Dependency scan blocks on high/critical in SHIPPED (production) deps.
      # Dev/build-tooling advisories are tracked separately, not a merge blocker.
      - name: dependency scan (production deps)
        run: pnpm audit --prod --audit-level=high
      - name: secrets scan (security review)
        run: |
          pipx install semgrep
          semgrep scan --config p/secrets --error --exclude '*.generated.ts'

  q45-lineage:
    name: Q4.5 — BCBS 239 lineage validation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ofbo
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ofbo
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:apply
      - run: pnpm db:seed
      # Exercise the real write-path emitters so lineage exists for the tables
      # that emit at write time (audit, risk_signal, approval_request, …).
      - run: pnpm test:integration
      # Gate: every table with rows must emit lineage, save documented gaps.
      - run: pnpm --filter @ofbo/db lineage:gate
