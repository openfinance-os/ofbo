# Demo-profile deployment (BD-14): Internal Portal on Cloudflare Workers, built
# by the OpenNext adapter. Secrets (never here): DATABASE_URL via CI / `wrangler
# secret put` — the portal's High-class audit write + read path needs it.
name = "ofbo-portal"
main = ".open-next/worker.js"
compatibility_date = "2025-05-05"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
DEPLOY_PROFILE = "demo"
# Demo bank tenant — matches the seeded dataset and the BFF worker.
BANK_ID = "11111111-1111-4111-8111-111111111111"
# Server-side BFF base URL — used only as a fallback for local dev. Deployed,
# the portal reaches the BFF via the service binding below (a Worker cannot call
# another Worker over its workers.dev URL — the subrequest loops back). Public
# URL, not a secret.
BFF_URL = "https://ofbo-bff.michartmann.workers.dev"

# Worker→Worker service binding to the BFF. lib/bff.ts calls env.BFF.fetch() when
# present; this is the reliable path between two Workers on the same account.
# service must match the BFF worker name (services/bff/wrangler.toml).
[[services]]
binding = "BFF"
service = "ofbo-bff"

[observability]
enabled = true
